name: eclipsear
description: Eclipse Explorer.
publish_to: 'none' 

version: 2.1.0+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  line_icons: ^2.0.3
  buttons_tabbar: ^1.3.15
  shared_preferences: ^2.5.4
  location: ^8.0.1
  geocoding: ^4.0.0
  auto_size_text: ^3.0.0
  flutter_launcher_icons: ^0.14.4
  google_maps_flutter: ^2.15.0
  sliding_up_panel: ^2.0.0+1
  csc_picker: ^0.2.7
  video_player: ^2.11.0
  flutter_local_notifications: ^21.0.0
  flutter_timezone: ^1.0.8
  flutter_svg: ^2.0.10+1
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  http: ^1.6.0
  share_plus: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

dependency_overrides:
  path_provider_windows: ^2.3.0

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/elogo.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/eclipses/
    - assets/json/
    - assets/svg/

  fonts:
    - family: Dubai
      fonts:
        - asset: assets/fonts/Dubai.ttf
