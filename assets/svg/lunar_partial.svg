<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="moonSurface" cx="40%" cy="36%" r="66%">
      <stop offset="0%"   stop-color="#E8E0CC"/>
      <stop offset="40%"  stop-color="#C0B898"/>
      <stop offset="100%" stop-color="#807060"/>
    </radialGradient>
    <radialGradient id="earthShadow" cx="40%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#1A1830"/>
      <stop offset="100%" stop-color="#06060F"/>
    </radialGradient>
    <radialGradient id="lunarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="52%"  stop-color="#8877CC" stop-opacity="0"/>
      <stop offset="72%"  stop-color="#6655AA" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#443388" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="moonBound">
      <circle cx="100" cy="100" r="66"/>
    </clipPath>
  </defs>

  <!-- Glow -->
  <circle cx="100" cy="100" r="96" fill="url(#lunarGlow)"/>

  <!-- Silver moon disk -->
  <circle cx="100" cy="100" r="66" fill="url(#moonSurface)"/>

  <!-- Earth's umbra shadow (~50% coverage from right) -->
  <circle cx="132" cy="98" r="68" fill="url(#earthShadow)" clip-path="url(#moonBound)"/>

  <!-- Moon limb -->
  <circle cx="100" cy="100" r="66" fill="none" stroke="#C8C0A8" stroke-width="1.5" stroke-opacity="0.65"/>
</svg>
