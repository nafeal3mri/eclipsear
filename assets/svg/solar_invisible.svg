<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="sunDim" cx="44%" cy="40%" r="64%">
      <stop offset="0%"   stop-color="#C8C090"/>
      <stop offset="40%"  stop-color="#A89040"/>
      <stop offset="100%" stop-color="#705A20"/>
    </radialGradient>
    <radialGradient id="glowDim" cx="50%" cy="50%" r="50%">
      <stop offset="52%"  stop-color="#806030" stop-opacity="0"/>
      <stop offset="74%"  stop-color="#806030" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#503C10" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dim atmosphere -->
  <circle cx="100" cy="100" r="96" fill="url(#glowDim)"/>

  <!-- Dim sun rays -->
  <g stroke="#907040" stroke-linecap="round" opacity="0.42">
    <line x1="100" y1="22" x2="100" y2="42" stroke-width="3"/>
    <line x1="153" y1="47" x2="139" y2="61" stroke-width="3"/>
    <line x1="178" y1="100" x2="158" y2="100" stroke-width="3"/>
    <line x1="153" y1="153" x2="139" y2="139" stroke-width="3"/>
    <line x1="100" y1="178" x2="100" y2="158" stroke-width="3"/>
    <line x1="47"  y1="153" x2="61"  y2="139" stroke-width="3"/>
    <line x1="22"  y1="100" x2="42"  y2="100" stroke-width="3"/>
    <line x1="47"  y1="47"  x2="61"  y2="61"  stroke-width="3"/>
  </g>

  <!-- Muted sun disk -->
  <circle cx="100" cy="100" r="58" fill="url(#sunDim)" opacity="0.65"/>

  <!-- Not-visible overlay -->
  <circle cx="100" cy="100" r="58" fill="#22223A" opacity="0.58"/>

  <!-- Eye-slash: two diagonal lines inside the disk -->
  <g stroke="#8888AA" stroke-linecap="round" stroke-width="5" opacity="0.80">
    <line x1="74" y1="74" x2="126" y2="126"/>
    <line x1="126" y1="74" x2="74" y2="126"/>
  </g>
</svg>
