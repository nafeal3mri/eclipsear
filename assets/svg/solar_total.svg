<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="coronaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="48%" stop-color="#FF5500" stop-opacity="0"/>
      <stop offset="66%" stop-color="#FF6600" stop-opacity="0.50"/>
      <stop offset="82%" stop-color="#FF8C00" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF3300" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonDisk" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#1C1C2E"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <radialGradient id="ringGlow" cx="50%" cy="50%" r="50%">
      <stop offset="56%" stop-color="#FF8C00" stop-opacity="0"/>
      <stop offset="72%" stop-color="#FF8C00" stop-opacity="0.70"/>
      <stop offset="80%" stop-color="#FFD080" stop-opacity="0.40"/>
      <stop offset="92%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer corona atmosphere -->
  <circle cx="100" cy="100" r="96" fill="url(#coronaGlow)"/>

  <!-- 8 primary corona rays (starting at moon edge rH65, going outward) -->
  <g stroke="#FF9940" stroke-linecap="round" opacity="0.78">
    <line x1="100" y1="34" x2="100" y2="6"  stroke-width="2.8"/>
    <line x1="146" y1="54" x2="166" y2="34" stroke-width="2.8"/>
    <line x1="166" y1="100" x2="193" y2="100" stroke-width="2.8"/>
    <line x1="146" y1="146" x2="166" y2="166" stroke-width="2.8"/>
    <line x1="100" y1="166" x2="100" y2="194" stroke-width="2.8"/>
    <line x1="54"  y1="146" x2="34"  y2="166" stroke-width="2.8"/>
    <line x1="34"  y1="100" x2="7"   y2="100" stroke-width="2.8"/>
    <line x1="54"  y1="54"  x2="34"  y2="34"  stroke-width="2.8"/>
  </g>

  <!-- 8 secondary thinner rays (22.5° offset) -->
  <g stroke="#FF9940" stroke-linecap="round" opacity="0.38">
    <line x1="125" y1="39"  x2="138" y2="15"  stroke-width="1.6"/>
    <line x1="161" y1="75"  x2="186" y2="63"  stroke-width="1.6"/>
    <line x1="161" y1="125" x2="186" y2="137" stroke-width="1.6"/>
    <line x1="125" y1="161" x2="138" y2="185" stroke-width="1.6"/>
    <line x1="75"  y1="161" x2="62"  y2="185" stroke-width="1.6"/>
    <line x1="39"  y1="125" x2="14"  y2="137" stroke-width="1.6"/>
    <line x1="39"  y1="75"  x2="14"  y2="63"  stroke-width="1.6"/>
    <line x1="75"  y1="39"  x2="62"  y2="15"  stroke-width="1.6"/>
  </g>

  <!-- Corona ring outer glow -->
  <circle cx="100" cy="100" r="68" fill="url(#ringGlow)"/>
  <!-- Corona ring sharp inner bright edge -->
  <circle cx="100" cy="100" r="64" fill="none" stroke="#FFE090" stroke-width="2.2" stroke-opacity="0.92"/>
  <circle cx="100" cy="100" r="68" fill="none" stroke="#FF8C00" stroke-width="9"   stroke-opacity="0.28"/>

  <!-- Moon disk -->
  <circle cx="100" cy="100" r="62" fill="url(#moonDisk)"/>
</svg>
